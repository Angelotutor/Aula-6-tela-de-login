<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-700 h-screen flex justify-center items-center">
    <form
      class="bg-white w-[30%] p-7 round-[10px] shadow-md flex flex-col gap-2"
    >
      <h1 class="text-center text-2xl font-bold p-10">Faça seu Login</h1>
      <div class="flex flex-col gap-2">
        <label for="email" class="text-xs">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          class="border-1 p-3 round-xl text-sm"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="senha" class="text-xs">senha</label>
        <input type="password" name="senha" id="senha" />
      </div>
      <div id="container-checkbox" class="flex flex-row justify-between">
        <div class="flex flex-col items-center gap-2">
          <input type="checkbox" name="Lembrar" id="Lembrar" />
          <label for="Lembrar" class="text-xs">Lembrar-me</label>
        </div>

        <a
          href="Esqueceu a senha"
          class="text-xl text-violet-700 font-bold"
        ></a>
      </div>

      <button
        class="bg-violet-700 text-white font-bold w-[100%] py-3 round-xl cursor-pointer hover:bg-violet-500"
        type="submit"
      >
        Entrar
      </button>

      <p class="text-xl text-center text-gay-700">
        Não possui uma conta?
        <a href="Cadastre-se" class="text-violet-700 font-bold"></a>
      </p>
    </form>
  </body>
</html>
